# /etc/nginx/sites-available/sae-polyglot
# Целиком заменить содержимое файла и: nginx -t && systemctl reload nginx

# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name sae-polyglot.ru www.sae-polyglot.ru;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name sae-polyglot.ru www.sae-polyglot.ru;

    ssl_certificate /etc/letsencrypt/live/sae-polyglot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sae-polyglot.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://ui-sandy-tau.vercel.app" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        add_header Access-Control-Allow-Origin "https://ui-sandy-tau.vercel.app" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
