spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/englishmovies?currentSchema=englishmovies
    username: ${SPRING_DATASOURCE_USERNAME:englishmovies}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    liquibase-schema: public
    default-schema: englishmovies

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Секреты только из переменных окружения (.env на сервере, см. DEPLOY.md)
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

translate:
  provider: yandex
yandex:
  translate:
    api-key: ${YANDEX_TRANSLATE_API_KEY:}
    folder-id: ${YANDEX_TRANSLATE_FOLDER_ID:}
