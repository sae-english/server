spring:
  application:
    name: english-movies-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Telegram: бот для отправки сообщений в твой канал (опционально)
# Создай бота через @BotFather, добавь его админом в канал, укажи сюда токен и chat_id
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

# Перевод текста: по умолчанию MyMemory (бесплатно, по HTTP). Чтобы вернуть Yandex: translate.provider=yandex
translate:
  provider: ${TRANSLATE_PROVIDER:mymemory}
  mymemory:
    email: ${TRANSLATE_MYMEMORY_EMAIL:}
# Yandex Cloud Translate (используется при translate.provider=yandex). См. YANDEX_TRANSLATE.md
yandex:
  translate:
    api-key: ${YANDEX_TRANSLATE_API_KEY:}
    folder-id: ${YANDEX_TRANSLATE_FOLDER_ID:}
